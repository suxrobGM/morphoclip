      train_max_sites_per_well: 9
      eval_max_sites_per_well: null
      within_well_interp_sites: 0
      same_pert_interp_sites: 3
      interp_alpha: 0.4
  - id: "same_pert_7"
    dataset:
      train_max_sites_per_well: 9
      eval_max_sites_per_well: null
      within_well_interp_sites: 0
