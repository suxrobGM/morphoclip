<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#2dd4bf"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="white" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="60" x2="1200" y2="60"/><line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/><line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="420" x2="1200" y2="420"/><line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
  </g>

  <!-- Decorative blobs -->
  <circle cx="950" cy="180" r="200" fill="#0d9488" opacity="0.08"/>
  <circle cx="1050" cy="400" r="150" fill="#6366f1" opacity="0.06"/>
  <circle cx="150" cy="500" r="180" fill="#0d9488" opacity="0.05"/>

  <!-- Icon: large M logo -->
  <g transform="translate(80, 160)">
    <rect width="100" height="100" rx="22" fill="url(#accentGrad)" opacity="0.9"/>
    <path d="M22 75V30l28 18 28-18v45" fill="none" stroke="white" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Title -->
  <text x="210" y="230" font-size="72" font-weight="800" fill="white" letter-spacing="-1">MorphoCLIP</text>

  <!-- Accent bar -->
  <rect x="82" y="280" width="80" height="4" rx="2" fill="url(#accentGrad)"/>

  <!-- Subtitle -->
  <text x="82" y="330" font-size="28" fill="#94a3b8" font-weight="400">AI-powered matching of cell microscopy images</text>
  <text x="82" y="368" font-size="28" fill="#94a3b8" font-weight="400">with text descriptions of biological treatments</text>

  <!-- Pipeline chips -->
  <g transform="translate(82, 420)">
    <!-- Image chip -->
    <rect width="180" height="42" rx="21" fill="#0d9488" opacity="0.15" stroke="#0d9488" stroke-width="1.5"/>
    <text x="90" y="27" text-anchor="middle" font-size="16" font-weight="600" fill="#2dd4bf">DINOv3 Vision</text>

    <!-- Arrow -->
    <text x="200" y="28" font-size="20" fill="#475569">+</text>

    <!-- Text chip -->
    <rect x="225" width="200" height="42" rx="21" fill="#6366f1" opacity="0.15" stroke="#6366f1" stroke-width="1.5"/>
    <text x="325" y="27" text-anchor="middle" font-size="16" font-weight="600" fill="#a78bfa">ModernBERT Text</text>

    <!-- Arrow -->
    <text x="445" y="28" font-size="20" fill="#475569">+</text>

    <!-- Loss chip -->
    <rect x="470" width="220" height="42" rx="21" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="580" y="27" text-anchor="middle" font-size="16" font-weight="600" fill="#fbbf24">Contrastive Learning</text>
  </g>

  <!-- Stats row -->
  <g transform="translate(82, 510)">
    <text x="0" y="0" font-size="18" fill="#64748b">
      <tspan font-weight="700" fill="#e2e8f0">3M+</tspan> images
      <tspan dx="20" font-weight="700" fill="#e2e8f0">303</tspan> compounds
      <tspan dx="20" font-weight="700" fill="#e2e8f0">160</tspan> genes
      <tspan dx="20" font-weight="700" fill="#e2e8f0">51</tspan> plates
    </text>
  </g>

  <!-- URL -->
  <text x="82" y="575" font-size="18" fill="#475569" font-weight="500">morphoclip.suxrobgm.net</text>
</svg>
