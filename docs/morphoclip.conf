# MorphoCLIP Docs Nginx Configuration
#
# Setup:
#   1. Copy: sudo cp morphoclip.conf /etc/nginx/sites-available/morphoclip.conf
#   2. Symlink: sudo ln -s /etc/nginx/sites-available/morphoclip.conf /etc/nginx/sites-enabled/
#   3. Deploy: rsync -avz docs/out/ user@vps:/var/www/morphoclip/
#   4. Test: sudo nginx -t
#   5. Reload: sudo systemctl reload nginx
#
# SSL with Certbot:
#   sudo apt install certbot
#   sudo certbot --nginx -d morphoclip.suxrobgm.net
#   sudo certbot renew --dry-run   # verify auto-renewal

server {
    listen 80;
    listen [::]:80;
    server_name morphoclip.suxrobgm.net;

    root /var/www/morphoclip;
    index index.html;

    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /images/ {
        expires 30d;
        add_header Cache-Control "public";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    error_page 404 /404.html;
}
